io:
  root_file: /data/crystalwang/testVectorPipeline/testData/DAOD_TrigGepPerf/Signal_HHbbbb_VBF/DAOD_JETM42.SIGNAL_HHBBBB_VBF_DAOD_JETM42.root
  out_h5: /data/crystalwang/testVectorPipeline/testData/outputHDF5Files/pythonHDF5.h5
  tree_name: CollectionTree

run:
  max_events: 100

collections:
  - name: gFEXSRJ
    key: L1_gFexSRJetRoI
    # getter: gfex
    double_vars: [Et, Eta, Phi]
    int_vars: [EtIndex]
    variables:
      Et:
        formula: "obj.et() / 1000.0"
      Eta:
        formula: "obj.eta()"
      Phi:
        formula: "obj.phi()"

  - name: jFEXSRJ
    key: L1_jFexSRJetRoI
    double_vars: [Et, Eta, Phi]
    int_vars: [EtIndex]
    variables:
      Et:
        formula: "obj.et() / 1000.0"
      Eta:
        formula: "obj.eta()"
      Phi:
        formula: "obj.phi()"

  - name: HLTJets
    key: HLT_AntiKt4EMTopoJets_subjesIS
    double_vars: [Et, Eta, Phi]
    int_vars: [EtIndex]
    variables:
      Et:
        formula: "obj.e() / (1000.0 * math.cosh(obj.eta()))"
      Eta:
        formula: "obj.eta()"
      Phi:
        formula: "obj.phi()"

  - name: RecoAK10
    key: AntiKt10UFOCSSKJets
    double_vars: [Et, Eta, Phi, Mass]
    int_vars: [EtIndex]
    variables:
      Et:
        formula: "obj.e() / (1000.0 * math.cosh(obj.eta()))"
      Eta:
        formula: "obj.eta()"
      Phi:
        formula: "obj.phi()"
      Mass:
        formula: "obj.m() / 1000.0"
    