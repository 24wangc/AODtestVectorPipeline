io:
  # the input hdf5 file produced in the first step
  input_file: "/data/crystalwang/testVectorPipeline/testData/outputHDF5Files/pythonHDF5.h5"
  # the directory that the test vectors will be generated to
  output_base_dir: "/data/crystalwang/testVectorPipeline/testData/testVectorsStep2/"

# configure the generation of random data
random:
  bool: false
  n: 30 # number of events
  num_particles: 3 # number of vectors per event
  seed: 12345

variables:
  et:
    hdf5_key: "Et" # the name the variable is stored as in the hdf5 file
    bits: 13
    min: 0.0
    max: 1024.0
    fixed: -1 # choose fixed options for pseudo random generation: -1 (none) 0 (vector with all zeros) 1 (vector with all ones) 2 (both all ones and all zero)

  eta:
    hdf5_key: "Eta"
    bits: 8
    min: -5.0
    max: 5.0
    fixed: -1

  phi:
    hdf5_key: "Phi"
    bits: 6
    min: -3.2
    max: 3.2
    fixed: -1

# Order of variables in the binary string and hex word (MSB -> LSB)
# Example: Et | Eta | Phi
packing_order: ["et", "eta", "phi"]
sort_by: "et" # variable to sort the data within each event by; otherwise FALSE

# make sure this matches with the config file in first step 
collections:
  - name: gFEXSRJ # ensure this name is the group name in the hdf5 file
    out_filedir: gFex

  - name: jFEXSRJ
    out_filedir: jFex

  - name: HLTJets
    out_filedir: HLT

  - name: RecoAK10
    out_filedir: Reco